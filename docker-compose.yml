version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: goal_portal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: goalportal
      POSTGRES_PASSWORD: goalportal_secret
      POSTGRES_DB: goalportal
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - goal_portal_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U goalportal -d goalportal']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goal_portal_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - goal_portal_network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  goal_portal_network:
    driver: bridge

  backend:
    build:
      context: ./backend
    container_name: goal_portal_backend
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://goalportal:goalportal_secret@postgres:5432/goalportal
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - goal_portal_network

  frontend:
    build:
      context: ./frontend
    container_name: goal_portal_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - goal_portal_network