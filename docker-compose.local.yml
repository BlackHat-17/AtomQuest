# docker-compose.local.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local testing override — swaps in dev credentials and corrects DB/Redis URLs
# to point to the internal Docker network hostnames.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    # Override env_file: use local .env (has working JWT, SMTP, AAD credentials)
    # instead of .env.production (which has placeholder values)
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      # Override DB/Redis URLs to use Docker-internal hostnames
      DATABASE_URL: postgresql://goalportal:goalportal_secret@postgres:5432/goalportal
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost

  frontend:
    build:
      args:
        # Vite build-time vars — baked into the JS bundle
        # Values come from frontend/.env (read by docker-compose via env_file or the host env)
        VITE_API_BASE_URL: http://localhost/api
        VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:-}
        VITE_AAD_CLIENT_ID: ${VITE_AAD_CLIENT_ID:-}
        VITE_AAD_TENANT_ID: ${VITE_AAD_TENANT_ID:-}
        VITE_AAD_REDIRECT_URI: ${VITE_AAD_REDIRECT_URI:-http://localhost}
